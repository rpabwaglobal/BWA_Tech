# Overlay Hostinger + Traefik (igual ao padrão do outro projeto: rede `web`, labels simples).
# O nosso backend também precisa de:
#   - traefik.docker.network  → Traefik fala com o contentor pela rede certa (está em `default` + `web`).
#   - traefik.http.services.*.loadbalancer.server.port=8000 → Daphne escuta na 8000 (o outro app costuma expor 80/5173).
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.hostinger.yml up -d --build
#
# TRAEFIK_NETWORK na maioria dos stacks Hostinger é `web` (como no scoredareforma). Confirme:
#   docker inspect traefik-z2mx-traefik-1 --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'

services:
  db:
    ports: !reset []
  backend:
    ports: !reset []
    environment:
      BEHIND_HTTPS_PROXY: "true"
    networks:
      - default
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-web}
      - "traefik.http.routers.bwaproj.rule=Host(`${PUBLIC_HOST:-tech.bwa.global}`)"
      - traefik.http.routers.bwaproj.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.bwaproj.loadbalancer.server.port=8000

networks:
  web:
    name: ${TRAEFIK_NETWORK:-web}
    external: true
