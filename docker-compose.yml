# BWAproj: banco + backend (Django + Daphne: API + WebSocket + SPA)
# Porta da aplicação: APP_PORT (padrão 8000). Se 8000 estiver em uso, use APP_PORT=8001 etc.
# Uso: docker compose up -d   → acesse http://localhost:${APP_PORT:-8000}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bwaproj_db}
      POSTGRES_USER: ${POSTGRES_USER:-bwaproj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bwaproj_secret}
    ports:
      # Host 5433 por padrão: no Windows costuma existir Postgres nativo em 5432; evita conflito.
      # Override: POSTGRES_PORT=5432 docker compose up -d db
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bwaproj} -d ${POSTGRES_DB:-bwaproj_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      USE_POSTGRES: "true"
      DB_NAME: ${POSTGRES_DB:-bwaproj_db}
      DB_USER: ${POSTGRES_USER:-bwaproj}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bwaproj_secret}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:-altere-em-producao-chave-longa-e-segura}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Broker/Backend do Celery (caso o backend dispare tasks)
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persistir uploads (fotos de perfil, etc.)
      - backend_media:/app/backend/media

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      USE_POSTGRES: "true"
      DB_NAME: ${POSTGRES_DB:-bwaproj_db}
      DB_USER: ${POSTGRES_USER:-bwaproj}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bwaproj_secret}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:-altere-em-producao-chave-longa-e-segura}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Broker/Backend do Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "config.celery", "worker", "--loglevel=INFO", "--concurrency=1", "--prefetch-multiplier=1"]
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      USE_POSTGRES: "true"
      DB_NAME: ${POSTGRES_DB:-bwaproj_db}
      DB_USER: ${POSTGRES_USER:-bwaproj}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bwaproj_secret}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:-altere-em-producao-chave-longa-e-segura}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Broker/Backend do Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "config.celery", "beat", "--loglevel=INFO"]
    restart: unless-stopped

volumes:
  postgres_data:
  backend_media:
  redis_data:
