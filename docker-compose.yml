# BWAproj: Postgres + Redis + backend (Django/Daphne) + Celery.
#
# O `.env` na raiz é copiado para DENTRO da imagem no Dockerfile (Django + build Vite).
# Precisa existir nessa pasta ao correr `docker compose build`; backend/Celery usam também `env_file: .env`
# (DOTENV_OVERRIDE=false na imagem) para o .env actual na VPS prevalecer sobre o baked ao arrancar.
#
# O serviço `db` usa `env_file: .env` para POSTGRES_* coincidir com os valores do mesmo ficheiro.
# Labels Traefik expandem ${PUBLIC_HOST} a partir do `.env` lido pelo Compose no host.
#
# Rede `web`: docker network create web (se ainda não existir). deploy.sh cria na LAN.
# Portas: HOST_BIND (default 127.0.0.1); deploy LAN: export DEPLOY_LAN_EXPOSE=1 antes de deploy.sh para 0.0.0.0.

services:
  db:
    image: postgres:16.6-alpine
    env_file: .env
    ports:
      # Bind LOCALHOST sempre. Exposição externa só via Traefik (não pelo Postgres).
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bwaproj} -d ${POSTGRES_DB:-bwaproj_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    # Exige senha (REDIS_PASSWORD do .env). Sem persistência em disco (broker apenas).
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --save \"\" --appendonly no --protected-mode yes"]
    env_file: .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Nome explícito da imagem para celery-worker/celery-beat reutilizarem (build 1x).
    image: bwaproj-app:latest
    env_file: .env
    restart: unless-stopped
    environment:
      # Valores vêm do `.env` na raiz; deploy.sh em LAN pode exportar e sobrepôr aqui.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_media:/app/backend/media
    networks:
      - default
      - web
    security_opt:
      - no-new-privileges:true
    # Hardening avançado (validar em staging antes de ativar em prod):
    # cap_drop: ["ALL"]
    # read_only: true
    # tmpfs: ["/tmp:size=64m"]
    labels:
      - traefik.enable=true
      # Obrigatório aqui (diferente do stack só-nginx): o backend está também na rede compose
      # "default"; sem isto o Traefik pode tentar IP errado. O outro projeto só usa "web".
      - traefik.docker.network=${TRAEFIK_NETWORK:-web}
      # Se o router não pegar HTTPS, compare com projetos sem esta linha: o teu Traefik pode não
      # ter entrypoint "websecure"; nesse caso comenta esta label ou igual ao nome nos static config.
      - traefik.http.routers.bwaproj.entrypoints=websecure
      - "traefik.http.routers.bwaproj.rule=Host(`${PUBLIC_HOST:-tech.bwa.global}`)"
      - traefik.http.routers.bwaproj.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.bwaproj.loadbalancer.server.port=8000

  celery-worker:
    # Reutiliza a imagem buildada pelo serviço `backend` (sem rebuild paralelo).
    image: bwaproj-app:latest
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    command: ["celery", "-A", "config.celery", "worker", "--loglevel=INFO", "--concurrency=1", "--prefetch-multiplier=1"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  celery-beat:
    image: bwaproj-app:latest
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    # --schedule=/tmp/...: writable como USER appuser (em /app/backend o user
    # ainda não tinha permissão consistente para apagar/rotacionar o .bak).
    command: ["celery", "-A", "config.celery", "beat", "--loglevel=INFO", "--schedule=/tmp/celerybeat-schedule"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  web:
    name: ${TRAEFIK_NETWORK:-web}
    external: true

volumes:
  postgres_data:
  backend_media:
  redis_data:
