name: Deploy to Hostinger VPS

# Dispara o deploy na VPS Hostinger via SSH (alternativa ao "Compose by URL"
# do Docker Manager, que estava perdendo o YAML).
#
# Como funciona:
#  1. Espera o workflow `Build and publish Docker image` terminar (publica em ghcr.io)
#  2. SSH na VPS
#  3. Clona/atualiza o repo em /opt/bwa_tech
#  4. `docker compose pull` (puxa imagem nova de ghcr.io)
#  5. `docker compose up -d` (recria os containers afetados)
#  6. Volumes nomeados (postgres_data, etc.) são preservados — dados intactos
#
# Pré-requisitos no GitHub (Settings → Secrets and variables → Actions):
#  - Secret  VPS_HOST         = IP da VPS
#  - Secret  VPS_USER         = root
#  - Secret  VPS_SSH_KEY      = chave PRIVADA SSH (conteúdo do id_ed25519 ou similar)
#  - Secret  VPS_SSH_PORT     = 22 (opcional, default 22)
#  - Secret  GHCR_PULL_TOKEN  = PAT com escopo read:packages (classic) ou Packages read (fine-grained)
#  - Secret  GHCR_USERNAME    = usuário GitHub dono do PAT (não use o nome da org)
#
# Alternativa sem PAT: tornar o pacote público em
#  GitHub → Packages → bwa_tech → Package settings → Change visibility → Public
#
# Pré-requisito na VPS (UMA VEZ): adicionar a chave PÚBLICA correspondente em
#  /root/.ssh/authorized_keys

on:
  # Quando o build da imagem termina (com sucesso) → deploy
  workflow_run:
    workflows: ["Build and publish Docker image"]
    types:
      - completed
    branches:
      - main
  # Quando MUDA SÓ o docker-compose.yml (não rebuilda imagem mas reaplica compose)
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - '.github/workflows/hostinger-deploy.yml'
  # Disparo manual pela UI ("Run workflow")
  workflow_dispatch:

jobs:
  deploy:
    # Roda em: dispatch manual / push (compose-only) / build bem-sucedido
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GHCR_PULL_TOKEN,GHCR_USERNAME
          script: |
            set -e
            export COMPOSE_PROJECT_NAME=bwa_tech

            # Imagem no GHCR é privada por padrão — login obrigatório antes do pull
            if [ -z "${GHCR_PULL_TOKEN:-}" ] || [ -z "${GHCR_USERNAME:-}" ]; then
              echo "ERRO: defina os secrets GHCR_PULL_TOKEN e GHCR_USERNAME no repositório."
              echo "      Ou torne o pacote ghcr.io/rpabwaglobal/bwa_tech público."
              exit 1
            fi
            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Clona o repo se ainda não existe, ou atualiza se já tem
            if [ ! -d /opt/bwa_tech/.git ]; then
              echo "==> Clonando repo em /opt/bwa_tech (primeira vez)"
              mkdir -p /opt/bwa_tech
              git clone https://github.com/rpabwaglobal/BWA_Tech.git /opt/bwa_tech
            else
              echo "==> Atualizando repo em /opt/bwa_tech"
              cd /opt/bwa_tech
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/bwa_tech

            # Puxa a imagem nova (publicada pelo workflow anterior)
            echo "==> Pulling latest images..."
            docker compose pull

            # Recria os containers afetados (volumes nomeados preservados)
            echo "==> Restarting containers..."
            docker compose up -d --remove-orphans

            # Limpa imagens antigas pra não encher o disco
            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Status final:"
            docker compose ps
