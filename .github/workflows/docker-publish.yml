name: Build and publish Docker image

# Builda a imagem Docker e publica em ghcr.io a cada push em `main`.
# Hostinger Docker Manager faz `docker compose pull` (não builda local).
# Setup uma vez: nada mais a fazer — cada commit em main gera nova imagem.

on:
  push:
    branches:
      - main
    paths:
      # Só rebuilda quando algo relevante muda. Mudanças em docs/scripts
      # não disparam build (economiza tempo + minutos do Actions).
      - 'Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - '.env'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
  # Permite disparar manualmente pela UI do GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # necessário para publicar em ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bwa_tech
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache nas próprias layers do GHCR — acelera builds subsequentes
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/bwa_tech:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/bwa_tech:buildcache,mode=max
